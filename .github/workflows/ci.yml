# AGENTS.md — Lihat AGENTS.md untuk panduan kolaborasi AI.
# Konfigurasi ini mengikuti praktik standar CI untuk Next.js + TypeScript.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun check-types

      - name: Lint
        run: bun lint

      - name: Format
        run: bun format:fix

      - name: Format check
        run: bun format

      - name: Build
        run: bun run build
